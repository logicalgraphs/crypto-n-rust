name: Scheduled Workflow
on:
  workflow_dispatch: # Allows manual triggering of the workflow 
  schedule:
    # Run this cron job every ten minutes
    - cron: "*/10 * * * *" 
jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - name: Perform scheduled task
        run: echo "This is our first automation workflow, Prism-Man!"
