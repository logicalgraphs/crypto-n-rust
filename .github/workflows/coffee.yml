name: coffee

on:
  workflow_dispatch:
  schedule:
    # test the cron ("Min Hour Day Month DayofWeek" in UTC) at scheduled time 
      - cron: "15 17 * * *" # in our time zone, this is 11:15 AM Eastern Time

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo run and Log Output
        run: |
          cargo run --manifest-path src/ch01/Cargo.toml --bin coffee >> data-files/covfefe.txt
        
      - name: Commit and Push changes
        env:
          USER_EMAIL: ${{ secrets.USER1_EMAIL }}
          USER_NAME: ${{ vars.USER1_NAME }}
        run: |
          git config --global user.email "$USER1_EMAIL"
          git config --global user.name "$USER1_NAME"
          git add data-files/covfefe.txt
          git commit -m "The Coffee Is All Yours!"
          git push

