name: coffee

on:
  workflow_dispatch:
  schedule:
    # test the cron at scheduled time
      - cron: "25 8 * * *" # From UTC, this is 12:25 PM Eastern Time

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run coffee.rs
        run: cargo run --bin coffee

      - name: Log Output
        run: |
          cargo run --bin coffee >> crypto-n-rust/data-files/covfefe.txt
        
      - name: Commit and Push changes to book_issue_015
        run: |
          git config user.email "bparis2002@gmail.com"
          git config user.name "DonxParis"
          git add data-files/covfefe.txt
          git commit -m "The Coffee Is All Yours!"
          git push
