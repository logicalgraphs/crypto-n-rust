name: coffee

on:
  workflow_dispatch:
  schedule:
    # test the cron at scheduled time
      - cron: "25 12 * * *"

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo run and Log Output
        run: |
          cargo run --bin coffee >> data-files/covfefe.txt
        
      - name: Commit and Push changes
        run: |
          git config user.email "${{ secrets.USER1_EMAIL }}"
          git config user.name "${{ vars.USER1_NAME }}"
          git add data-files/covfefe.txt
          git commit -m "The Coffee Is All Yours!"
          git push
