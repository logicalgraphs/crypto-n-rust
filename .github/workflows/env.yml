name: env
on:
  workflow_dispatch: 

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    steps:
      - name: Run The Echo and Display The Date
        run: echo "LE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
        
      - name: Display The Date
        run: echo "The environment is $GITHUB_ENV"
