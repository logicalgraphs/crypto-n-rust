name: coffee

on:
  workflow_dispatch:
  schedule:
    # test the cron at scheduled time
      - cron: "25 12 * * *"

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run coffee and Log Output
        run: cargo run --bin coffee >> data-files/covfefe.txt
        
      - name: Commit and Push changes to book_issue_015
        run: |
          git add data-file/covfefe.txt
          git commit -m "The Coffee Is All Yours!"
          git push
          
